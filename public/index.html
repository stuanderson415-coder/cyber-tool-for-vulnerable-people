<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Safety Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.400.0?external=react,react-dom",
        "framer-motion": "https://esm.sh/framer-motion@11?external=react,react-dom"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#FDFCF8]">
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState } from "react";
        import { createRoot } from "react-dom/client";
        import { 
          Shield, 
          ShieldAlert, 
          ShieldCheck, 
          HelpCircle, 
          ArrowRight, 
          MessageCircle, 
          Heart, 
          Lock,
          UserCircle
        } from "lucide-react";
        import { motion, AnimatePresence } from "framer-motion";

        const ANALYZER_RULES = [
          {
            keywords: ["vacation", "holiday", "away", "travel", "trip", "airport", "hotel", "beach", "flying", "plane"],
            tip: {
              title: "Wait to share your trips",
              advice: "Try to post your vacation photos after you get back home.",
              why: "When you post while you are away, it lets everyone know your house might be empty.",
              icon: <ShieldAlert className="w-6 h-6 text-amber-600" />
            }
          },
          {
            keywords: ["birthday", "born", "age", "turning", "january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"],
            tip: {
              title: "Keep your birthday private",
              advice: "Avoid sharing your full birth date (month, day, and year).",
              why: "People can use your birthday to try and guess your passwords or pretend to be you to a bank.",
              icon: <Lock className="w-6 h-6 text-blue-600" />
            }
          },
          {
            keywords: ["dog", "cat", "pet", "puppy", "kitten", "name", "buddy", "max", "bella", "lucy", "daisy", "charlie", "rocky"],
            tip: {
              title: "Pet names are secret keys",
              advice: "If you share your pet's name, make sure you don't use it as a password.",
              why: "Pet names are very common answers for 'secret questions' on bank and email websites.",
              icon: <Heart className="w-6 h-6 text-rose-600" />
            }
          },
          {
            keywords: ["school", "university", "college", "graduated", "high school", "elementary", "middle school", "class of"],
            tip: {
              title: "School memories",
              advice: "Sharing your school name can help people guess your 'secret questions'.",
              why: "Websites often ask which school you went to to prove it is really you.",
              icon: <HelpCircle className="w-6 h-6 text-purple-600" />
            }
          },
          {
            keywords: ["grandkids", "children", "son", "daughter", "family", "kids", "grandson", "granddaughter", "niece", "nephew"],
            tip: {
              title: "Family photos",
              advice: "Make sure your account is set so only your real friends can see these photos.",
              why: "It protects your family's privacy and keeps children's faces safe from strangers.",
              icon: <ShieldCheck className="w-6 h-6 text-emerald-600" />
            }
          },
          {
            keywords: ["work", "office", "job", "company", "boss", "colleague", "working", "shift"],
            tip: {
              title: "Work details",
              advice: "Be careful sharing exactly where you work and what your daily schedule is.",
              why: "This helps strangers know exactly where you are at certain times of the day.",
              icon: <MessageCircle className="w-6 h-6 text-indigo-600" />
            }
          }
        ];

        function App() {
          const [input, setInput] = useState("");
          const [results, setResults] = useState([]);
          const [hasSearched, setHasSearched] = useState(false);

          const analyzeSafety = () => {
            if (!input.trim()) return;
            
            const foundTips = [];
            const lowerInput = input.toLowerCase();

            ANALYZER_RULES.forEach(rule => {
              if (rule.keywords.some(k => lowerInput.includes(k))) {
                foundTips.push(rule.tip);
              }
            });

            setResults(foundTips);
            setHasSearched(true);
          };

          return (
            <div className="min-h-screen bg-[#FDFCF8] text-slate-800 selection:bg-emerald-100 pb-20">
              {/* Header */}
              <header className="max-w-3xl mx-auto pt-16 px-6 text-center">
                <motion.div 
                  initial={{ scale: 0.8, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  className="inline-flex items-center justify-center w-20 h-20 bg-emerald-100 rounded-3xl mb-8 shadow-sm"
                >
                  <Shield className="w-10 h-10 text-emerald-700" />
                </motion.div>
                <h1 className="text-4xl font-bold text-slate-900 mb-4 tracking-tight">
                  Digital Safety Companion
                </h1>
                <p className="text-xl text-slate-600 leading-relaxed max-w-xl mx-auto">
                  A gentle way to learn how to keep yourself safe online. 
                  Tell us a bit about what you usually share with others.
                </p>
              </header>

              <main className="max-w-3xl mx-auto py-12 px-6">
                {/* Input Section */}
                <motion.div 
                  layout
                  className="bg-white rounded-[2rem] border border-slate-200 shadow-sm p-8 mb-12 transition-all hover:shadow-md"
                >
                  <div className="flex items-center gap-3 mb-6">
                    <UserCircle className="w-6 h-6 text-slate-400" />
                    <label htmlFor="description" className="text-sm font-bold uppercase tracking-widest text-slate-500">
                      Tell us about your habits
                    </label>
                  </div>
                  <textarea
                    id="description"
                    className="w-full min-h-[180px] p-6 text-xl bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 focus:bg-white outline-none transition-all resize-none placeholder:text-slate-400 leading-relaxed"
                    placeholder="Example: 'I post photos of my grandkids and my dog Buster. I also share photos when I am on vacation at the beach...'"
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                  />
                  <button
                    onClick={analyzeSafety}
                    className="mt-8 w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-bold text-xl flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-lg shadow-emerald-900/10"
                  >
                    Check my safety
                    <ArrowRight className="w-6 h-6" />
                  </button>
                </motion.div>

                {/* Results Section */}
                <AnimatePresence>
                  {hasSearched && (
                    <motion.div 
                      initial={{ opacity: 0, y: 20 }}
                      animate={{ opacity: 1, y: 0 }}
                      className="space-y-8"
                    >
                      <div className="flex items-center justify-between px-2">
                        <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-3">
                          <ShieldCheck className="w-7 h-7 text-emerald-600" />
                          Your Personal Safety Guide
                        </h2>
                        <span className="text-sm font-medium text-slate-400 bg-slate-100 px-3 py-1 rounded-full">
                          Based on your notes
                        </span>
                      </div>

                      {results.length > 0 ? (
                        <div className="grid gap-6">
                          {results.map((tip, idx) => (
                            <motion.div 
                              key={idx}
                              initial={{ opacity: 0, x: -20 }}
                              animate={{ opacity: 1, x: 0 }}
                              transition={{ delay: idx * 0.1 }}
                              className="bg-white rounded-[2rem] border border-slate-200 p-8 flex gap-8 items-start shadow-sm hover:border-emerald-200 transition-colors group"
                            >
                              <div className="shrink-0 p-4 bg-slate-50 rounded-2xl group-hover:bg-emerald-50 transition-colors">
                                {tip.icon}
                              </div>
                              <div>
                                <h3 className="text-2xl font-bold text-slate-900 mb-3">{tip.title}</h3>
                                <p className="text-xl text-emerald-700 font-semibold mb-4 leading-relaxed">
                                  {tip.advice}
                                </p>
                                <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                                  <p className="text-slate-600 text-lg leading-relaxed">
                                    <strong className="text-slate-900">Why this helps: </strong>
                                    {tip.why}
                                  </p>
                                </div>
                              </div>
                            </motion.div>
                          ))}
                        </div>
                      ) : (
                        <motion.div 
                          initial={{ opacity: 0 }}
                          animate={{ opacity: 1 }}
                          className="bg-emerald-50 rounded-[2rem] border border-emerald-100 p-12 text-center"
                        >
                          <ShieldCheck className="w-16 h-16 text-emerald-600 mx-auto mb-6" />
                          <h3 className="text-2xl font-bold text-emerald-900 mb-4">You're doing a great job!</h3>
                          <p className="text-xl text-emerald-800 max-w-lg mx-auto leading-relaxed">
                            We didn't find any common risks in what you wrote. 
                            Keep being careful about what you share!
                          </p>
                        </motion.div>
                      )}

                      {/* General Rules - The "Golden Rules" */}
                      <div className="mt-16 p-10 bg-slate-900 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-12 opacity-10 pointer-events-none">
                            <Shield className="w-64 h-64 text-white" />
                        </div>
                        <h3 className="text-2xl font-bold mb-8 flex items-center gap-3 relative">
                          <HelpCircle className="w-7 h-7 text-emerald-400" />
                          Three simple rules for everyone
                        </h3>
                        <div className="space-y-8 relative">
                          <div className="flex gap-6 items-start">
                            <div className="w-10 h-10 rounded-2xl bg-emerald-500/20 flex items-center justify-center shrink-0 mt-1 text-emerald-400 font-bold text-lg italic">1</div>
                            <div>
                                <p className="text-xl font-bold text-white mb-1">Think before you post</p>
                                <p className="text-lg text-slate-400">If a complete stranger knew this about you, could they use it to trick you or find you?</p>
                            </div>
                          </div>
                          <div className="flex gap-6 items-start">
                            <div className="w-10 h-10 rounded-2xl bg-emerald-500/20 flex items-center justify-center shrink-0 mt-1 text-emerald-400 font-bold text-lg italic">2</div>
                            <div>
                                <p className="text-xl font-bold text-white mb-1">Keep your circle small</p>
                                <p className="text-lg text-slate-400">Check your settings to make sure your photos and notes are only seen by "Friends" or "Family."</p>
                            </div>
                          </div>
                          <div className="flex gap-6 items-start">
                            <div className="w-10 h-10 rounded-2xl bg-emerald-500/20 flex items-center justify-center shrink-0 mt-1 text-emerald-400 font-bold text-lg italic">3</div>
                            <div>
                                <p className="text-xl font-bold text-white mb-1">When in doubt, ask a friend</p>
                                <p className="text-lg text-slate-400">If you get a strange message or request, ask a trusted family member before you click anything.</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </motion.div>
                  )}
                </AnimatePresence>
              </main>

              <footer className="max-w-3xl mx-auto py-16 px-6 border-t border-slate-200/60 text-center">
                <p className="text-slate-400 text-lg font-medium">Built to help everyone stay a little safer online.</p>
              </footer>
            </div>
          );
        }

        const container = document.getElementById("root");
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
